name: Sync SharePoint Doc to Markdown Natively

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert Local Staging File
        env:
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # 1. Find the file that Power Automate just dropped into /staging
          # (We look for any .docx file in the staging directory)
          LOCAL_DOCX=$(ls staging/*.docx | head -n 1)
          
          if [ -z "$LOCAL_DOCX" ]; then
            echo "Error: No .docx file found in the staging folder!"
            exit 1
          fi
          
          # 2. Determine clean output name for the docs folder
          OUTPUT_NAME=$(echo "$FILE_NAME" | sed 's/\.docx$/\.md/')
          mkdir -p docs
          
          # 3. Convert natively using local files only
          pandoc "$LOCAL_DOCX" -t markdown -o "docs/$OUTPUT_NAME"
          
          # 4. Clean up the staging folder so it stays empty for the next run
          rm "$LOCAL_DOCX"

      - name: Auto-Commit Markdown Directly to Docs Folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically compiled markdown manual natively"
          file_pattern: 'docs/*.md'