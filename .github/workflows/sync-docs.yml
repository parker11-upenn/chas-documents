name: Sync SharePoint Doc to Markdown

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Unpack Payload and Convert
        env:
          RAW_CONTENT: ${{ github.event.client_payload.fileContent }}
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # 1. Decode the incoming text string back into a real Word document
          echo "$RAW_CONTENT" | base64 --decode > temp_input.docx
          
          # 2. Clean the filename: replace %20 with hyphens, and safely drop the .docx extension
          # Using | as a separator prevents the terminal from throwing an 'unterminated s' error
          CLEAN_NAME=$(echo "$FILE_NAME" | sed 's/%20/-/g' | sed 's|\.docx$||')
          mkdir -p docs
          
          # 3. Convert natively on local disk, appending the clean .md extension
          pandoc temp_input.docx -t markdown -o "docs/${CLEAN_NAME}.md"
          rm temp_input.docx

      - name: Auto-Commit Markdown Directly to Docs Folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically compiled markdown manual via payload"
          file_pattern: 'docs/*.md'