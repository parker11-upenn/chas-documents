steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures the runner pulls all recent history to prevent push rejections

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Unpack Incoming Binary and Convert
        env:
          RAW_CONTENT: ${{ github.event.client_payload.fileContent }}
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # 1. Decode the base64 text stream back into a pristine binary Word file
          echo "$RAW_CONTENT" | base64 --decode > temp_input.docx
          
          # 2. Determine output markdown filename
          OUTPUT_NAME=$(echo "$FILE_NAME" | sed 's/\.docx$/\.md/')
          mkdir -p docs
          
          # 3. Use Pandoc to convert the local file natively on disk
          pandoc temp_input.docx -t markdown -o "docs/$OUTPUT_NAME"
          
          # 4. Tidy up the workspace
          rm temp_input.docx

      - name: Auto-Commit Markdown Directly to Docs Folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically compiled markdown manual via payload runner"
          file_pattern: 'docs/*.md'