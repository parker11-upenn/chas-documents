name: Sync SharePoint Doc to Markdown

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Unpack Payload and Convert Natively
        env:
          RAW_CONTENT: ${{ github.event.client_payload.fileContent }}
          PAYLOAD_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # 1. Decode the document binary to disk
          echo "$RAW_CONTENT" | base64 --decode > temp_input.docx
          mkdir -p docs
          
          # 2. Determine safe filename
          # If the payload name is blank, null, or missing, fallback to a clean base name
          CLEAN_TITLE=$(echo "$PAYLOAD_NAME" | sed 's/[[:space:]]//g')
          
          if [ -z "$CLEAN_TITLE" ] || [ "$CLEAN_TITLE" = "null" ]; then
            echo "Filename missing from payload channel. Using fallback name with timestamp."
            FINAL_FILENAME="automated_manual_$(date +'%Y%m%d_%H%M%S')"
          else
            # Clean up incoming spaces/underlines from a true live trigger string
            FINAL_FILENAME=$(echo "$PAYLOAD_NAME" | sed 's/%20/_/g' | sed 's/ /_/g' | sed 's|\.docx$||' | tr '[:upper:]' '[:lower:]')
          fi
          
          # 3. Convert natively using Pandoc
          pandoc temp_input.docx -t markdown -o "docs/${FINAL_FILENAME}.md"
          rm temp_input.docx
          echo "Success! Saved document to docs/${FINAL_FILENAME}.md"

      - name: Auto-Commit Markdown Directly to Docs Folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically compiled markdown manual"
          file_pattern: 'docs/*.md'