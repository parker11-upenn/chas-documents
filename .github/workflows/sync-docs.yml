- name: Stream DOCX via API and Convert
        env:
          STAGING_PATH: ${{ github.event.client_payload.stagingPath }}
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # 1. Format spaces in the file path string so the web request doesn't fragment
          CLEAN_PATH=$(echo "$STAGING_PATH" | sed 's| |%20|g')
          
          # 2. Pull the raw binary file stream using Microsoft's direct content endpoint
          curl -L -o temp_input.docx "https://graph.microsoft.com/v1.0/me/drive/root:${CLEAN_PATH}:/content"
          
          # 3. Verify the file actually arrived and isn't a corrupted HTML string
          if [ ! -s temp_input.docx ]; then
            echo "Error: Streamed file is empty or missing!"
            exit 1
          fi
          
          # 4. Process the Pandoc markdown compilation locally on disk
          OUTPUT_NAME=$(echo "$FILE_NAME" | sed 's/\.docx$/\.md/')
          mkdir -p docs
          pandoc temp_input.docx -t markdown -o "docs/$OUTPUT_NAME"
          
          # 5. Clear out temporary workspace binary
          rm temp_input.docx