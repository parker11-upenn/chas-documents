name: Sync SharePoint Doc to Markdown

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Converters
        run: |
          npm install mammoth turndown

      - name: Run Conversion Script
        env:
          FILE_CONTENT_BASE64: ${{ github.event.client_payload.fileContent }}
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          node .github/scripts/convert-payload.js

      - name: Auto-Commit Markdown Directly to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically updated markdown manual from SharePoint"
          file_pattern: 'docs/*.md'