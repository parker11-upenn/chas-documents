name: Sync SharePoint Doc to Markdown via Staging Link

on:
  repository_dispatch:
    types: [convert_docx_to_md]

permissions:
  contents: write

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download File from Sharing Link
        env:
          DOWNLOAD_URL: ${{ github.event.client_payload.downloadUrl }}
        run: |
          # Pull the file binary straight from the secure organization sharing link
          curl -L -f -o temp_input.docx "$DOWNLOAD_URL"

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert DOCX to Markdown
        env:
          FILE_NAME: ${{ github.event.client_payload.fileName }}
        run: |
          # Determine crisp markdown output title
          OUTPUT_NAME=$(echo "$FILE_NAME" | sed 's/\.docx$/\.md/')
          mkdir -p docs
          
          # Convert natively on local disk
          pandoc temp_input.docx -t markdown -o "docs/$OUTPUT_NAME"
          rm temp_input.docx

      - name: Auto-Commit Markdown Directly to Docs Folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically compiled markdown manual via staging link"
          file_pattern: 'docs/*.md'